plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def dartDefines = [:]
if (project.hasProperty('dart-defines')) {
    dartDefines = dartDefines + project.property('dart-defines')
            .split(',')
            .collectEntries { entry ->
                def pair = new String(entry.decodeBase64(), 'UTF-8').split('=')
                pair.length == 2 ? [(pair[0]): pair[1]] : [:]
            }
}

def iosDartDefines = dartDefines.collect { k, v -> "${k}=${v}" }.join(",")
project.ext.set("dart-defines-ios", iosDartDefines)

android {
    namespace = "com.theberridge.mill_road_winter_fair_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId = "com.theberridge.mill_road_winter_fair_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Check for dartDefines in case the key is not set
        if (dartDefines.containsKey('GOOGLE_MAPS_AND_SHEETS_API_KEY')) {
            resValue "string", "GOOGLE_MAPS_AND_SHEETS_API_KEY", dartDefines['GOOGLE_MAPS_AND_SHEETS_API_KEY']
        } else {
            throw new GradleException("GOOGLE_MAPS_AND_SHEETS_API_KEY is missing from dart-defines.")
        }
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_FILE"))
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            ndk {
                // Enable debug symbols for native code
                debugSymbolLevel 'SYMBOL_TABLE'
            }
            signingConfig signingConfigs.release
            minifyEnabled true // Enable for optimization
            shrinkResources true // Remove unused resources
        }
    }
}

flutter {
    source = "../.."
}
