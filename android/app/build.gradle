plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // The Google services Gradle plugin
    id 'com.google.gms.google-services'
}

dependencies {
    // Import the Firebase BoM
    implementation platform('com.google.firebase:firebase-bom:34.12.0')

    // When using the BoM, don't specify versions in Firebase dependencies
    implementation 'com.google.firebase:firebase-analytics'

    // Add the dependencies for any other desired Firebase products
    // https://firebase.google.com/docs/android/setup#available-libraries
}

def dartDefines = [:]
if (project.hasProperty('dart-defines')) {
    dartDefines = dartDefines + project.property('dart-defines')
            .split(',')
            .collectEntries { entry ->
                def pair = new String(entry.decodeBase64(), 'UTF-8').split('=')
                pair.length == 2 ? [(pair[0]): pair[1]] : [:]
            }
}

def iosDartDefines = dartDefines.collect { k, v -> "${k}=${v}" }.join(",")
project.ext.set("dart-defines-ios", iosDartDefines)

android {
    namespace = "com.theberridge.mill_road_winter_fair_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId = "com.theberridge.mill_road_winter_fair_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Check for dartDefines in case the key is not set
        if (dartDefines.containsKey('HEROKU_API')) {
            resValue "string", "HEROKU_API", dartDefines['HEROKU_API']
        } else {
            throw new GradleException("HEROKU_API is missing from dart-defines.")
        }
        if (dartDefines.containsKey('HEROKU_API_KEY')) {
            resValue "string", "HEROKU_API_KEY", dartDefines['HEROKU_API_KEY']
        } else {
            throw new GradleException("HEROKU_API_KEY is missing from dart-defines.")
        }
        if (dartDefines.containsKey('ANDROID_GOOGLE_MAPS_SDK_API_KEY')) {
            resValue "string", "ANDROID_GOOGLE_MAPS_SDK_API_KEY", dartDefines['ANDROID_GOOGLE_MAPS_SDK_API_KEY']
        } else {
            throw new GradleException("ANDROID_GOOGLE_MAPS_SDK_API_KEY is missing from dart-defines.")
        }
        if (dartDefines.containsKey('ANDROID_GOOGLE_MAPS_DIRECTIONS_API_KEY')) {
            resValue "string", "ANDROID_GOOGLE_MAPS_DIRECTIONS_API_KEY", dartDefines['ANDROID_GOOGLE_MAPS_DIRECTIONS_API_KEY']
        } else {
            throw new GradleException("ANDROID_GOOGLE_MAPS_DIRECTIONS_API_KEY is missing from dart-defines.")
        }
        if (dartDefines.containsKey('SIGNING_KEY')) {
            resValue "string", "SIGNING_KEY", dartDefines['SIGNING_KEY']
        } else {
            throw new GradleException("SIGNING_KEY is missing from dart-defines.")
        }
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_FILE"))
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            ndk {
                // Enable debug symbols for native code
                debugSymbolLevel 'SYMBOL_TABLE'
            }
            signingConfig signingConfigs.release
            minifyEnabled true // Enable for optimization
            shrinkResources true // Remove unused resources
        }
    }
}

flutter {
    source = "../.."
}
